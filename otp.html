    window.onload = function() {
  
  let minute = 1;
  let sec = 59;

  const timerElement = document.getElementById("waktu");

  const countdown = setInterval(function() {
   
    let displayMin = minute < 10 ? "0" + minute : minute;
    let displaySec = sec < 10 ? "0" + sec : sec;
    
    timerElement.innerHTML = displayMin + " : " + displaySec;

   
    if (minute === 0 && sec === 0) {
      clearInterval(countdown);
      timerElement.innerHTML = "00 : 00";
      alert("Kode Aktivasi kadaluarsa. Kirim Ulang."); 
    } else {
      if (sec === 0) {
        minute--;
        sec = 59;
      } else {
        sec--;
      }
    }
  }, 1000);
}
    </script>

        function startTimer1() {
          var presentTime = document.getElementById('timer').innerHTML;
          var timeArray = presentTime.split(/[:]+/);
          var m = timeArray[0];
          var s = checkSecond((timeArray[1] - 1));
          if(s==59){m=m-1}
          if(m<0){
            return
          }
          
          document.getElementById('timer').innerHTML =
            m + " : " + s;
          console.log(m)
          setTimeout(startTimer1, 1000);
          
        }
        
        function checkSecond(sec) {
          if (sec < 10 && sec >= 0) {sec = "0" + sec}; // add zero in front of numbers < 10
          if (sec < 0) {sec = "59"};
          return sec;
        }
        
        
        
  </script>
